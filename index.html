<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 轉捐款芳名錄 HTML 產生器</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      color: #333;
      line-height: 1.6;
      padding: 24px;
      max-width: 1100px;
      margin: auto;
    }
    .panel {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 22px;
      background: #fafafa;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 6px;
      font-family: inherit;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      background: #21B8D7;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 14px;
    }
    textarea {
      height: 360px;
      font-family: Consolas, Monaco, monospace;
      font-size: 14px;
    }
    .hint {
      color: #666;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Excel 轉捐款芳名錄 HTML 產生器</h1>

  <div class="panel">
    <p class="hint">
      Excel 第一列請放欄位名稱，建議欄位為：收據日期、收據抬頭、捐款金額。
      欄位名稱可用下方選單對應。
    </p>

    <label>上傳 Excel</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />

    <label>主標題</label>
    <input id="mainTitle" value="社團法人台北市新生命促進身障就業協會" />

    <label>副標題</label>
    <input id="subTitle" value="114/11~115/04 勸募捐款芳名錄" />

    <div id="mapping" style="display:none;">
      <label>收據日期欄位</label>
      <select id="dateCol"></select>

      <label>收據抬頭欄位</label>
      <select id="nameCol"></select>

      <label>捐款金額欄位</label>
      <select id="amountCol"></select>

      <button id="generateBtn">產生 HTML</button>
    </div>
  </div>

  <div class="panel">
    <h2>產生結果</h2>
    <button id="copyBtn">複製 HTML</button>
    <button id="downloadBtn">下載 HTML</button>
    <textarea id="output" placeholder="產生後的 HTML 會出現在這裡"></textarea>
  </div>

  <div class="panel">
    <h2>預覽</h2>
    <iframe id="preview"></iframe>
  </div>

<script>
let rows = [];
let headers = [];

const fileInput = document.getElementById("fileInput");
const mapping = document.getElementById("mapping");
const dateCol = document.getElementById("dateCol");
const nameCol = document.getElementById("nameCol");
const amountCol = document.getElementById("amountCol");
const output = document.getElementById("output");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data, { type: "array", cellDates: false });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
  headers = Object.keys(rows[0] || {});

  if (!headers.length) {
    alert("讀不到欄位，請確認 Excel 第一列是標題列。");
    return;
  }

  fillSelect(dateCol, headers, ["收據日期", "日期"]);
  fillSelect(nameCol, headers, ["收據抬頭", "抬頭", "姓名", "捐款人"]);
  fillSelect(amountCol, headers, ["捐款金額", "金額"]);
  mapping.style.display = "block";
});

function fillSelect(select, options, preferredNames) {
  select.innerHTML = "";
  options.forEach(h => {
    const opt = document.createElement("option");
    opt.value = h;
    opt.textContent = h;
    select.appendChild(opt);
  });

  const matched = options.find(h => preferredNames.some(p => h.includes(p)));
  if (matched) select.value = matched;
}

document.getElementById("generateBtn").addEventListener("click", () => {
  const html = buildHtml({
    mainTitle: document.getElementById("mainTitle").value.trim(),
    subTitle: document.getElementById("subTitle").value.trim(),
    dateKey: dateCol.value,
    nameKey: nameCol.value,
    amountKey: amountCol.value,
    rows
  });

  output.value = html;
  preview.srcdoc = html;
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!output.value) return alert("請先產生 HTML。");
  await navigator.clipboard.writeText(output.value);
  alert("已複製 HTML。");
});

document.getElementById("downloadBtn").addEventListener("click", () => {
  if (!output.value) return alert("請先產生 HTML。");
  const blob = new Blob([output.value], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "donation-list.html";
  a.click();
  URL.revokeObjectURL(url);
});

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatAmount(value) {
  const raw = String(value ?? "").trim();
  if (!raw) return "";

  if (/NT\$/.test(raw)) return raw;

  const num = Number(raw.replace(/[,$\s]/g, ""));
  if (Number.isFinite(num)) {
    return "NT$" + num.toLocaleString("en-US") + "-";
  }
  return raw;
}

function buildHtml({ mainTitle, subTitle, dateKey, nameKey, amountKey, rows }) {
  const cleanRows = rows.filter(r =>
    String(r[dateKey] ?? "").trim() ||
    String(r[nameKey] ?? "").trim() ||
    String(r[amountKey] ?? "").trim()
  );

  const desktopRows = cleanRows.map(r => {
    const date = escapeHtml(r[dateKey]);
    const name = escapeHtml(r[nameKey]);
    const amount = escapeHtml(formatAmount(r[amountKey]));
    return `                <tr><td>${date}</td><td>${name}</td><td>${amount}</td></tr>`;
  }).join("\n");

  const mobileRows = cleanRows.map((r, index) => {
    const date = escapeHtml(r[dateKey]);
    const name = escapeHtml(r[nameKey]);
    const amount = escapeHtml(formatAmount(r[amountKey]));
    const divider = index < cleanRows.length - 1 ? `\n        <div class="divider"></div>` : "";
    return `        <div class="donation-item">
            <p class="line-b"><span class="label">收據日期</span>${date}</p>
            <p class="line-b"><span class="label">捐款金額</span>${amount}</p>
            <p class="line-b"><span class="label">收據抬頭</span>${name}</p>
        </div>${divider}`;
  }).join("\n\n");

  return `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeHtml(subTitle)}</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            color: #333;
            line-height: 1.6;
        }
        .title-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .title-section p {
            font-size: 22px;
            font-weight: bold;
            margin: 5px 0;
        }
        .mobile-view {
            display: none;
        }
        .donation-item {
            padding-top: 10px;
        }
        .line-b {
            margin: 0;
            padding: 10px 0;
            font-size: 18px;
            border-bottom: 1px solid #ddd;
        }
        .donation-item p:last-child {
            border-bottom: none;
        }
        .divider {
            border-bottom: 3px solid #21b8d7;
            margin: 0 0 10px 0;
        }
        .label {
            color: #f0951b;
            font-weight: bold;
            display: inline-block;
            width: 90px;
        }
        .desktop-view {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
        }
        thead tr {
            background-color: #21B8D7;
            color: #FFFFFF;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            font-size: 20px;
            font-weight: 500;
        }
        td {
            font-size: 18px;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        @media screen and (max-width: 768px) {
            .desktop-view {
                display: none;
            }
            .mobile-view {
                display: block;
            }
            .title-section p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="title-section">
        <p>${escapeHtml(mainTitle)}</p>
        <p>${escapeHtml(subTitle)}</p>
    </div>

    <div class="desktop-view">
        <table>
            <thead>
                <tr>
                    <th>收據日期</th>
                    <th>收據抬頭</th>
                    <th>捐款金額</th>
                </tr>
            </thead>
            <tbody>
${desktopRows}
            </tbody>
        </table>
    </div>

    <div class="mobile-view">
${mobileRows}
    </div>

</body>
</html>`;
}
</script>
</body>
</html>
